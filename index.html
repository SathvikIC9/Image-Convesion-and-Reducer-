<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport meta tag: Critical for mobile browsers.
      width=device-width: sets viewport width to the device screen width
      initial-scale=1.0: no zoom on load
      Without this, mobile browsers render at desktop width and zoom out.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelPress — Image Reducer & Converter</title>
    <meta name="description" content="Compress and convert images. Supports JPG, PNG, WEBP, BMP, GIF, TIFF." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml" svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗜️</text></link>
    </head>
  <body>
    <!--
      This is the only div React needs in the HTML.
      ReactDOM.createRoot(document.getElementById('root')) in main.tsx
      attaches the entire app here.
    -->
    <div id="root"></div>

    <!--
      Vite injects this script tag automatically during build.
      type="module" tells the browser to treat it as an ES Module
      (supports import/export syntax natively).
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
